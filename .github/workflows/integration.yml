name: Integration

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Install backend binaries
        run: |
          pipx install gallery-dl
          pipx install yt-dlp

      - name: Install Chromium for CDP tests
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser

      - name: Integration tests
        run: go test -tags=integration -count=1 ./...
